<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>hello-wasm example</title>
  </head>
  <body style="margin: 0; padding: 0;">
    <div
      style="
        display: flex;
        flex-direction: column; /* Stack elements vertically */
        justify-content: flex-start; /* Start from top */
        align-items: center;
        height: 100vh;
        padding-top: 20px; /* Space from top */
        box-sizing: border-box;
        background-color: #282626;
      "
    >
      <!-- Slider controls -->
      <div
        style="
          margin-bottom: 10px;
          display: flex;
          align-items: center;
          gap: 10px;
        "
      >
        <label for="massSlider" style="color: white;">Black Hole Mass (10^36 kg)</label>
        <input type="range" id="massSlider" min="1" max="20" value="8" />
        <span id="massValue">8</span>
      </div>
      <canvas
        id="myCanvas"
        width="300"
        height="300"
        style="
          width: 800px;
          height: 800px;
          border: 1px solid black;
          image-rendering: pixelated;
        "
      >
      </canvas>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
